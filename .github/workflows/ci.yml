# This is the pipeline. It runs automatically on GitHub every time you push.
#
#   test   -> install the environment, run the tests, run the linter
#   deploy -> only on main; a placeholder for now (see the README to wire up a
#             real deploy)
#
# Fork this repo, turn Actions on, push a commit, and watch it run.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run the tests
        run: uv run pytest

      - name: Lint
        run: uv run ruff check .

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # A real deploy tells your host to pull and run the new version. On Render,
      # that's a single line:
      #     run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      # It's left as a harmless placeholder here so your fork goes green without
      # setting up any secrets. See "Going further" in the README to wire it up.
      - name: Deploy (placeholder)
        run: echo "Tests passed. This is where a real deploy would run."
